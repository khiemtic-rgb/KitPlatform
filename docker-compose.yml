version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharmacore-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pharmacore
      POSTGRES_PASSWORD: pharmacore_dev_2026
      POSTGRES_DB: pharmacore
    ports:
      - "5432:5432"
    volumes:
      - pharmacore_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pharmacore -d pharmacore"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pharmacore_pgdata:
