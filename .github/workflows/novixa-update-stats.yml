# Cập nhật stats-snapshot.json cho trang /vi/thong-ke (chạy tay hoặc theo lịch).
name: Novixa update stats

on:
  workflow_dispatch:
  schedule:
    # Mỗi 6 giờ
    - cron: '15 */6 * * *'

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: novixa-site/package-lock.json

      - name: Kiểm tra CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_ANALYTICS_API_TOKEN: ${{ secrets.CF_ANALYTICS_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -z "$CF_ANALYTICS_API_TOKEN" ]; then
            echo "::error::Thiếu CLOUDFLARE_API_TOKEN hoặc CF_ANALYTICS_API_TOKEN"
            echo "Tạo token Cloudflare: Zone → Analytics → Read (novixa.vn)"
            exit 1
          fi

      - name: Fetch Cloudflare analytics
        working-directory: novixa-site
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ANALYTICS_API_TOKEN: ${{ secrets.CF_ANALYTICS_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm ci
          npm run fetch:stats-snapshot

      - name: Commit stats snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # Không dùng [skip ci] — Cloudflare Pages bỏ qua build và snapshot không lên novixa.vn
          commit_message: 'chore(novixa): update stats snapshot'
          file_pattern: novixa-site/public/stats-snapshot.json

      - name: Trigger Cloudflare deploy
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$CF_DEPLOY_HOOK"
            echo "Đã gọi CF_DEPLOY_HOOK."
          else
            echo "CF_DEPLOY_HOOK chưa set — Cloudflare Pages sẽ deploy khi push commit stats (không [skip ci])."
          fi
