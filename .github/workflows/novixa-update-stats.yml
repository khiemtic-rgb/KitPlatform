# Cập nhật stats-snapshot.json cho trang /vi/thong-ke (chạy tay hoặc theo lịch).
name: Novixa update stats

on:
  workflow_dispatch:
  schedule:
    # Mỗi 6 giờ
    - cron: '15 */6 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/novixa-update-stats.yml'
      - 'novixa-site/scripts/fetch-stats-snapshot.mjs'

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: novixa-site/package-lock.json

      - name: Kiểm tra GitHub Secrets
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          missing=""
          [ -z "$CF_ZONE_ID" ] && missing="$missing CF_ZONE_ID"
          [ -z "$CLOUDFLARE_API_TOKEN" ] && missing="$missing CLOUDFLARE_API_TOKEN"
          if [ -n "$missing" ]; then
            echo "::error::Thiếu GitHub Secrets:$missing"
            echo "Vào repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Fetch Cloudflare analytics
        working-directory: novixa-site
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm ci
          npm run fetch:stats-snapshot
          test -f public/stats-snapshot.json || (echo "::error::Không tạo được stats-snapshot.json" && exit 1)
          node -e "const d=require('./public/stats-snapshot.json'); if(d.ok===false) { console.error(d.error); process.exit(1) }"

      - name: Commit stats snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): update stats snapshot [skip ci]'
          file_pattern: novixa-site/public/stats-snapshot.json

      - name: Trigger Cloudflare deploy
        if: ${{ secrets.CF_DEPLOY_HOOK != '' }}
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: curl -fsS -X POST "$CF_DEPLOY_HOOK"
