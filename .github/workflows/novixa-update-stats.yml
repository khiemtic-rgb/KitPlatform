# Cập nhật stats-snapshot.json cho trang /vi/thong-ke (chạy tay hoặc theo lịch).
name: Novixa update stats

on:
  workflow_dispatch:
  schedule:
    # Mỗi 6 giờ
    - cron: '15 */6 * * *'

jobs:
  stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: novixa-site/package-lock.json

      - name: Kiểm tra CLOUDFLARE_API_TOKEN
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::Thiếu GitHub Secret CLOUDFLARE_API_TOKEN"
            echo "Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Fetch Cloudflare analytics
        working-directory: novixa-site
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npm ci
          npm run fetch:stats-snapshot
          node -e "const d=require('./public/stats-snapshot.json'); if(d.ok!==true) { console.error(d.error||'fetch failed'); process.exit(1) }"

      - name: Commit stats snapshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): update stats snapshot [skip ci]'
          file_pattern: novixa-site/public/stats-snapshot.json

      - name: Trigger Cloudflare deploy
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$CF_DEPLOY_HOOK"
          else
            echo "CF_DEPLOY_HOOK not set — bỏ qua (Cloudflare sẽ deploy khi push commit stats)."
          fi
