# Mỗi ngày build lại site để bài có pubDate = hôm nay được hiển thị.
# Tuỳ chọn: thêm secret CF_DEPLOY_HOOK (Cloudflare Pages → Deploy hooks) để deploy không cần commit.
name: Novixa scheduled publish

on:
  schedule:
    # 00:05 giờ Việt Nam (UTC+7) ≈ 17:05 UTC ngày hôm trước
    - cron: '5 17 * * *'
  workflow_dispatch:
    inputs:
      article_id:
        description: 'Thử 1 bài (vd. nv-loyalty) — maps ARTICLE_ID'
        required: false
        type: string
      force_publish:
        description: 'Đăng ngay hôm nay (FORCE_PUBLISH)'
        required: false
        type: boolean
        default: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: novixa-site/package-lock.json

      - name: Auto-publish tin tức (Gemini viết bài + ảnh)
        working-directory: novixa-site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          PUBLISH_DATE: ${{ vars.PUBLISH_DATE }}
          ARTICLE_ID: ${{ github.event.inputs.article_id || vars.ARTICLE_ID }}
          FORCE_PUBLISH: ${{ github.event.inputs.force_publish != 'false' && github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: |
          npm ci
          echo "ARTICLE_ID=${ARTICLE_ID:-<empty>}"
          echo "FORCE_PUBLISH=${FORCE_PUBLISH:-<empty>}"
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::error::Thiếu GEMINI_API_KEY trong GitHub Secrets"
            exit 1
          fi
          if [ -z "$ARTICLE_ID" ] && [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "::warning::Chưa nhập article_id (vd. nv-a01) — chỉ chạy bài lên lịch hôm nay nếu có."
          fi
          npm run publish:news

      - name: Import tin từ Excel (nếu có)
        if: ${{ github.event.inputs.article_id == '' && vars.ARTICLE_ID == '' }}
        working-directory: novixa-site
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -f import/tin-tuc.xlsx ] || [ -f import/tin-tuc.csv ]; then
            npm run import:news
          else
            echo "Không có Excel import — bỏ qua."
          fi

      - name: Ảnh cho bài đăng hôm nay (chỉ bài thiếu .png)
        working-directory: novixa-site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_IMAGE_MODEL: ${{ vars.GEMINI_IMAGE_MODEL }}
          PUBLISH_DATE: ${{ vars.PUBLISH_DATE }}
        run: npm run ensure:today-images

      - name: Commit bài import (nếu đổi)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): import/scheduled news publish'
          file_pattern: |
            novixa-site/src/content/tin-tuc/*.md
            novixa-site/public/images/tin-tuc/*.png
            novixa-site/import/news-images-manifest.json
            novixa-site/import/fanpage-posted.json

      - name: Đăng fanpage (bài pubDate hôm nay, giờ VN)
        working-directory: novixa-site
        continue-on-error: true
        env:
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          FB_PAGE_ACCESS_TOKEN: ${{ secrets.FB_PAGE_ACCESS_TOKEN }}
        run: npm run post:fanpage

      - name: Cập nhật thống kê truy cập
        working-directory: novixa-site
        continue-on-error: true
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_ANALYTICS_API_TOKEN: ${{ secrets.CF_ANALYTICS_API_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] && [ -z "$CF_ANALYTICS_API_TOKEN" ]; then
            echo "Bỏ qua stats — chưa có CLOUDFLARE_API_TOKEN trên GitHub Secrets."
            exit 0
          fi
          npm run fetch:stats-snapshot

      - name: Commit log fanpage và stats (nếu đổi)
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore(novixa): fanpage post log / stats'
          file_pattern: |
            novixa-site/import/fanpage-posted.json
            novixa-site/public/stats-snapshot.json

      - name: Trigger Cloudflare Pages deploy
        env:
          CF_DEPLOY_HOOK: ${{ secrets.CF_DEPLOY_HOOK }}
        run: |
          if [ -n "$CF_DEPLOY_HOOK" ]; then
            curl -fsS -X POST "$CF_DEPLOY_HOOK"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --allow-empty -m "chore(novixa): scheduled daily rebuild"
            git push
          fi
